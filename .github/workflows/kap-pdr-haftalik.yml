# Fon Hisse Detay: KAP Portföy Dağılım Raporu — yalnızca yeni bildirim olduğunda güncelleme
#
# fon_hisse_scraper.py --sadece-yeni-pdr: KAP filter API ile bildirim tarihi vs yerel kap_rapor_tarihi.
# Yeni PDR olmayan fonlarda bile kap_son_kontrol_* (kontrol damgası) yazılır; tarayıcı sadece
# bildirimi yenilenmiş fonda açılır. Birleşik JSON her çalışmada yazılır — Pazartesi job’undan commit beklenir.
#
# Zaman: Haftalık Pazartesi 07:00 UTC (~10:00 TR). PDR ayda ~1 yenilenebilir; haftalık kontrol yeterli ara.

name: KAP PDR (yeni bildirim kontrolü)

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kap-pdr-incremental
  cancel-in-progress: true

jobs:
  pdr:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bağımlılıklar
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Yalnız yeni PDR (incremental)
        env:
          PYTHONUNBUFFERED: "1"
        run: python fon_hisse_scraper.py --tum-manifest --sadece-yeni-pdr --delay 2 --peek-delay 0.35

      - name: Hisse JSON değişikliklerini commit ve push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/fon_hisse_birlesik.json
          for f in data/*_hisse_pdr.json; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "Hisse/PDR çıktısı değişmedi, commit yok"
          else
            git commit -m "chore(data): KAP PDR hisse güncellemesi (incremental) [skip ci]"
            git push
          fi
