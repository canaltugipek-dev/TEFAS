# TEFAS: HSYF getiri + manifest (tefas_scraper.py)
#
# Risksiz bacak (Sharpe/Sortino): Anahtarsiz tcmb.gov.tr 1 haftalik repo (politika) HTML tablosu —
# her basarili calistirmada enrich_manifest_entries_with_stats() seriyi ve rasyoları yeniler.
#
# Zaman: Pazartesi–Cuma 09:00 UTC (~12:00 TR, UTC+3). Hafta sonu calistirilmaz: yurt ici borsa kapali
# oldugundan TEFAS’ta yeni fiyat satiri genelde gelmez; gereksiz tam tarama ve dakika yememek icin schedule
# hafta içi. (Pazar gecesi politikada nadir degisiklik icin diledigin zaman “Run workflow → manifest-only”
# kullanilabilir; bu adim NAV cekmez, yalnizca mevcut JSON + politik/benchmark ile manifesti tazeler.)

name: TEFAS günlük veri

on:
  schedule:
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          Tam tarama — tum fon NAV + politika/rasyolar (hafta ici beklenen). manifest-only —
          sadece diskteki *_tefas.json ile manifest (repo tablosu politik faiz, benchmark, stats); TEFAS taraması yok.
        type: choice
        default: full
        options:
          - full
          - manifest-only

permissions:
  contents: write

concurrency:
  group: tefas-daily-scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      RUN_MODE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.mode || 'full' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Bağımlılıklar (pip)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Tam modda TEFAS istegi playwright fallback ile gerekebilir.
      - name: Playwright chromium
        if: env.RUN_MODE == 'full'
        run: python -m playwright install chromium --with-deps

      - name: TEFAS scrape veya manifest yenileme
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -e
          echo "RUN_MODE=${RUN_MODE}"
          if [ "$RUN_MODE" = "manifest-only" ]; then
            python tefas_scraper.py --manifest-yenile
          else
            python tefas_scraper.py
          fi

      - name: data/ değişikliklerini commit ve push
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Yeni veri yok, commit yok"
          else
            if [ "$RUN_MODE" = "manifest-only" ]; then
              MSG="chore(data): politik faiz ve rasyolar (manifest yenile) [skip ci]"
            else
              MSG="chore(data): TEFAS otomatik güncelleme [skip ci]"
            fi
            git commit -m "$MSG"
            git push
          fi
